<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ .Title }} - {{ .Site.Title }}</title>
<link rel="canonical" href="{{ .Permalink }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap">
{{- partialCached "head/style.html" . -}}
</head>
<body>
{{- partialCached "head/colorScheme" . "global" -}}
<noscript><h1>{{ .Title }}</h1><p>{{ len .Pages }} posts</p>
<ul>{{- range .Pages -}}<li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>{{- end -}}</ul>
<a href="/">Home</a></noscript>
{{- partialCached "tag-page/site-data.html" . "global" -}}
<script>
var T={t:{{ .Title | jsonify | safeJS }},s:{{ .Site.Title | jsonify | safeJS }},c:{{ len .Pages }},p:[
{{- range .Pages -}}[{{ .Title | jsonify | safeJS }},{{ .RelPermalink | jsonify | safeJS }},"{{ .Date.Format "2006-01-02" }}",{{ with .Params.description }}{{ . | jsonify | safeJS }}{{ else }}""{{ end }}],
{{- end -}}]};
</script>
{{- partialCached "tag-page/widget-data.html" . "global" -}}
<script src="/js/tag-page.js"></script>
</body></html>
