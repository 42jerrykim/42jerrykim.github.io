name: Lint Content Frontmatter

on:
  pull_request:
    paths:
      - 'content/**'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      # 신규 글은 title<=70자·tags>=50개·승인 태그 표기(data/tags.yaml)를 강제(fail), 기존 글 수정은 경고만.
      # 근거: .claude/skills/rules-that-must-be-followed/SKILL.md §1
      - name: Lint frontmatter (title/description/tags)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: python3 script/lint_frontmatter.py "$BASE_SHA"
