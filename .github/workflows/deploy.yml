# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

# Opt into Node.js 24 for JS actions until all pinned actions ship node24 metadata (GitHub changelog 2025-09-19)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.154.5
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb          
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Restore Hugo resources cache
        uses: actions/cache@v5
        with:
          path: |
            ./resources
            .hugo_cache
          key: hugo-resources-${{ runner.os }}-${{ hashFiles('content/**', 'layouts/**', 'config/**', 'assets/**') }}
          restore-keys: |
            hugo-resources-${{ runner.os }}-

      # configure-pages@v5는 아직 action.yml에 node20만 선언되어 Summary 경고가 남습니다.
      # 표준 GitHub Pages URL(user: https://OWNER.github.io/, project: /REPO/)만 쓰는 경우 동일 결과입니다.
      # 커스텀 도메인·비표준 설정이면 actions/configure-pages 새 릴리스(node24) 후 되돌리세요.
      - name: Set Pages base URL
        id: pages
        shell: bash
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "base_url=https://${OWNER}.github.io" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=https://${OWNER}.github.io/${REPO}" >> "$GITHUB_OUTPUT"
          fi

      # Node.js 설치 (pagefind CLI via npx 사용)
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'            # 원하는 LTS 버전 선택

      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
      
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ github.workspace }}/.hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: America/Los_Angeles
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"   

      - name: Remove original PNG files (keep WebP-converted versions)
        run: |
          echo "=== Before cleanup ==="
          du -sh public/
          find public/post -type f -name '*.png' ! -name '*_hu_*' -delete
          find public/tags -type d -name 'page' -exec rm -rf {} + 2>/dev/null || true
          find public/categories -type d -name 'page' -exec rm -rf {} + 2>/dev/null || true
          echo "=== After cleanup ==="
          du -sh public/

      # Pagefind 인덱스 생성
      - name: Run Pagefind
        run: npx pagefind --site public --output-subdir _pagefind --glob "post/**/*.html" --verbose

      # upload-pages-artifact는 내부에서 node20용 upload-artifact 고정 SHA를 써서 경고가 납니다.
      # 공식 composite와 동일하게 tar 후 actions/upload-artifact@v7(node24)로 업로드합니다.
      - name: Archive static site for Pages
        shell: bash
        run: |
          echo ::group::Archive artifact
          tar \
            --dereference --hard-dereference \
            --directory "$INPUT_PATH" \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .
          echo ::endgroup::
        env:
          INPUT_PATH: ./public

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      # deploy-pages@v4도 아직 node20 메타데이터라 Summary 경고가 남을 수 있습니다(업스트림 node24 릴리스 대기).
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
