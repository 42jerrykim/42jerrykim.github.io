# ============================================================
# Approved Tag Taxonomy
# ============================================================
# All tags used in content frontmatter should come from this list.
# Concepts that are genuinely written both ways in Korean tech
# writing use a single bilingual tag, "English(한글)" (e.g.
# Algorithm(알고리즘)) -- see tag-consolidation-plan.md Phase 8.
# Proper nouns/brand names (Python, Docker, AWS, ...) stay
# English-only: a Korean phonetic gloss is not a natural bilingual
# form. A handful of general-topic words are Korean-only because
# usage volume was too low on both sides to matter and the concept
# reads more naturally in Korean.
#
# When writing a post, pick 25 or more tags from this list.
# ============================================================

